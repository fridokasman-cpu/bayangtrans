<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan - BayangTrans Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/admin-data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            color: white;
            padding: 20px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .navbar-user { display: flex; align-items: center; gap: 15px; }
        .user-info { text-align: right; }
        .user-info h4 { font-size: 0.95rem; margin-bottom: 2px; }
        .user-info p { font-size: 0.75rem; color: #9ca3af; }
        
        .user-avatar {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700;
        }
        
        .btn-logout {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 600; font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.3s ease; border: none; cursor: pointer;
        }
        
        .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        
        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .page-header h1 { font-size: 2rem; color: #1f2937; margin-bottom: 8px; }
        .page-header p { color: #6b7280; font-size: 0.95rem; }
        
        .btn-back {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 600; font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none; border: none; cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(107, 114, 128, 0.4); }
        
        .tabs-container {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px;
        }
        
        .tabs-header {
            display: flex; background: #f9fafb;
            border-bottom: 2px solid #e5e7eb; overflow-x: auto;
        }
        
        .tab-btn {
            flex: 1; min-width: 150px; padding: 18px 20px;
            background: none; border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem; font-weight: 600; color: #6b7280;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; white-space: nowrap;
        }
        
        .tab-btn:hover { color: #667eea; background: rgba(102, 126, 234, 0.05); }
        .tab-btn.active { color: #667eea; background: white; border-bottom: 3px solid #667eea; margin-bottom: -2px; }
        
        .tab-content { display: none; padding: 30px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .info-box {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-left: 4px solid #667eea;
            padding: 18px 22px; border-radius: 12px;
            margin-bottom: 25px; display: flex;
