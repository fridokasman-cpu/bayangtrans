<script src="../js/api.js"></script>
<script>
    let allKendaraan = [];

    // Cek login
    async function checkAuth() {
        const status = await checkLoginStatus();
        if (!status.logged_in) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('admin-name').textContent = status.admin.nama;
        }
    }

    // Load data dari database
    async function loadData() {
        allKendaraan = await getKendaraanFromDB();
        renderAll();
    }

    // Render semua
    function renderAll() {
        const motor = allKendaraan.filter(k => k.tipe === 'Motor');
        const mobil = allKendaraan.filter(k => k.tipe === 'Mobil');
        
        document.getElementById('motor-ketersediaan').innerHTML = 
            motor.map(m => renderKetersediaanCard(m, 'motor')).join('');
        
        document.getElementById('mobil-ketersediaan').innerHTML = 
            mobil.map(m => renderKetersediaanCard(m, 'mobil')).join('');
        
        document.getElementById('motor-harga').innerHTML = 
            motor.map(m => renderHargaCard(m, 'motor')).join('');
        
        document.getElementById('mobil-harga').innerHTML = 
            mobil.map(m => renderHargaCard(m, 'mobil')).join('');
    }

    function renderKetersediaanCard(item, type) {
        return `
            <div class="vehicle-card ${type} ${item.tersedia ? 'available' : 'unavailable'}" data-id="${item.id}">
                <div class="vehicle-header">
                    <div>
                        <div class="vehicle-name">${item.nama}</div>
                        <span class="vehicle-type">${type === 'motor' ? 'Motor' : 'Mobil'}</span>
                    </div>
                    <div class="status-toggle ${item.tersedia ? 'active' : ''}" onclick="toggleStatus(${item.id}, this)"></div>
                </div>
                <div class="vehicle-price">Rp ${item.harga.toLocaleString('id-ID')}<span style="font-size: 0.8rem; font-weight: 500;">/hari</span></div>
                <ul class="vehicle-features">
                    ${item.fitur.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                </ul>
                <span style="font-size: 0.85rem; font-weight: 600; color: ${item.tersedia ? '#059669' : '#dc2626'};">
                    ${item.tersedia ? '✓ Tersedia' : '✗ Tidak Tersedia'}
                </span>
            </div>
        `;
    }

    function renderHargaCard(item, type) {
        return `
            <div class="vehicle-card ${type}" data-id="${item.id}">
                <div class="vehicle-header">
                    <div>
                        <div class="vehicle-name">${item.nama}</div>
                        <span class="vehicle-type">${type === 'motor' ? 'Motor' : 'Mobil'}</span>
                    </div>
                </div>
                <div class="vehicle-price" id="price-display-${item.id}">Rp ${item.harga.toLocaleString('id-ID')}<span style="font-size: 0.8rem; font-weight: 500;">/hari</span></div>
                <ul class="vehicle-features">
                    ${item.fitur.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                </ul>
                <div class="price-edit">
                    <label><i class="fas fa-edit"></i> Ubah Harga</label>
                    <div class="price-input-group">
                        <input type="number" class="price-input" id="price-input-${item.id}" value="${item.harga}" placeholder="Masukkan harga">
                        <button class="btn-save" onclick="savePrice(${item.id})">
                            <i class="fas fa-save"></i> Simpan
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    async function toggleStatus(id, element) {
        const card = element.closest('.vehicle-card');
        const isActive = element.classList.contains('active');
        const newStatus = !isActive;
        
        const result = await updateKetersediaan(id, newStatus);
        
        if (result.success) {
            // Update UI
            if (newStatus) {
                element.classList.add('active');
                card.classList.remove('unavailable');
                card.classList.add('available');
                card.querySelector('span:last-child').innerHTML = '✓ Tersedia';
                card.querySelector('span:last-child').style.color = '#059669';
            } else {
                element.classList.remove('active');
                card.classList.remove('available');
                card.classList.add('unavailable');
                card.querySelector('span:last-child').innerHTML = '✗ Tidak Tersedia';
                card.querySelector('span:last-child').style.color = '#dc2626';
            }
            showToast(newStatus ? 'Kendaraan sekarang tersedia!' : 'Kendaraan ditandai tidak tersedia');
        } else {
            showToast('Gagal memperbarui status!', 'error');
        }
    }

    async function savePrice(id) {
        const input = document.getElementById(`price-input-${id}`);
        const newPrice = parseInt(input.value);
        
        if (newPrice > 0) {
            const result = await updateHarga(id, newPrice);
            if (result.success) {
                document.getElementById(`price-display-${id}`).innerHTML = 
                    `Rp ${newPrice.toLocaleString('id-ID')}<span style="font-size: 0.8rem; font-weight: 500;">/hari</span>`;
                showToast(`Harga berhasil diperbarui menjadi Rp ${newPrice.toLocaleString('id-ID')}`);
            } else {
                showToast('Gagal memperbarui harga!', 'error');
            }
        } else {
            showToast('Harga tidak valid!', 'error');
        }
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = message;
        toast.style.background = type === 'error' 
            ? 'linear-gradient(135deg, #ef4444, #dc2626)' 
            : 'linear-gradient(135deg, #10b981, #059669)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    function doLogout() {
        if (confirm('Yakin ingin logout?')) {
            logoutAdmin().then(() => {
                window.location.href = 'login.html';
            });
        }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await checkAuth();
        await loadData();
    });
</script>
