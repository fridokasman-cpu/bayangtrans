<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Kendaraan - BayangTrans</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="js/admin-data.js"></script>
    <script src="js/api.js"></script>
    <style>
        .page-header {
            padding: 150px 0 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-align: center;
        }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .page-header p { font-size: 1.1rem; opacity: 0.9; }
        
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 25px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .vehicle-features {
            list-style: none;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--gray);
        }
        .vehicle-features li { margin-bottom: 5px; }
        .vehicle-features i { color: var(--success); margin-right: 8px; }
        
        .vehicle-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .status-available { background: #d1fae5; color: #065f46; }
        .status-unavailable { background: #fee2e2; color: #991b1b; }
        
        .vehicle-badge.unavailable {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
        }
        
        .btn-book.disabled {
            background: linear-gradient(135deg, #9ca3af, #6b7280) !important;
            cursor: not-allowed;
        }
        
        .vehicle-img.unavailable { filter: grayscale(70%); }
        
        /* Admin Access Hidden */
        .admin-access {
            position: fixed;
            bottom: 100px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(31, 41, 55, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 998;
            opacity: 0;
            text-decoration: none;
        }
        .admin-access:hover {
            opacity: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        body:hover .admin-access { opacity: 0.5; }
        body:hover .admin-access:hover { opacity: 1; }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="BayangTrans" class="logo-img" onerror="this.style.display='none'">
                <span class="logo-text">Bayang<span>Trans</span></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="kendaraan.html" class="active">Kendaraan</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="tentang.html">Tentang</a></li>
                <li><a href="kontak.html">Kontak</a></li>
            </ul>
            <a href="https://wa.me/6281263860005" class="nav-cta" target="_blank">
                <i class="fab fa-whatsapp"></i> Hubungi Kami
            </a>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Pilihan Kendaraan Kami</h1>
            <p>Temukan motor atau mobil terbaik untuk petualangan Anda di Jogja</p>
        </div>
    </section>

    <section class="popular-section" style="padding-top: 50px;">
        <div class="container">
            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="Motor">Motor</button>
                <button class="filter-btn" data-filter="Mobil">Mobil</button>
                <button class="filter-btn" data-filter="tersedia">Tersedia</button>
            </div>
            <div class="popular-grid" id="kendaraan-grid">
                <p style="text-align:center; width:100%;">Memuat kendaraan...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container" style="text-align:center;">
            <p>&copy; 2024 BayangTrans. All rights reserved.</p>
        </div>
    </footer>

    <a href="https://wa.me/6281263860005" class="floating-wa" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <a href="admin/login.html" class="admin-access" title="Admin Login">
        <i class="fas fa-lock"></i>
    </a>

    <script src="js/main.js"></script>
    <script>
        // Load kendaraan dari localStorage
        function renderKendaraan(filter = 'all') {
            const data = getKendaraan();
            const container = document.getElementById('kendaraan-grid');
            const all = [...data.motor, ...data.mobil];
            
            let filtered = all;
            if (filter === 'Motor') filtered = data.motor;
            else if (filter === 'Mobil') filtered = data.mobil;
            else if (filter === 'tersedia') filtered = all.filter(k => k.tersedia);
            
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1/-1;">Tidak ada kendaraan tersedia.</p>';
                return;
            }
            
            container.innerHTML = filtered.map(item => {
                const tipe = data.motor.find(m => m.id === item.id) ? 'Motor' : 'Mobil';
                const isAvailable = item.tersedia;
                
                return `
                    <div class="vehicle-card fade-in">
                        <div class="vehicle-badge ${!isAvailable ? 'unavailable' : (tipe === 'Mobil' ? 'popular' : '')}">
                            ${!isAvailable ? 'Tidak Tersedia' : tipe}
                        </div>
                        <div class="vehicle-img ${!isAvailable ? 'unavailable' : ''}" style="background: url('${item.gambar}') center/cover;"></div>
                        <div class="vehicle-info">
                            <span class="vehicle-status ${isAvailable ? 'status-available' : 'status-unavailable'}">
                                ${isAvailable ? '✓ Tersedia' : '✗ Sedang Disewa'}
                            </span>
                            <h3>${item.nama}</h3>
                            <div class="vehicle-rating">
                                ${'<i class="fas fa-star"></i>'.repeat(Math.floor(item.rating))}
                                <span>(${item.rating})</span>
                            </div>
                            <div class="vehicle-price">
                                <span class="price">Rp ${item.harga.toLocaleString('id-ID')}</span>
                                <span class="period">/hari</span>
                            </div>
                            <ul class="vehicle-features">
                                ${item.fitur.map(f => `<li><i class="fas fa-check"></i> ${f}</li>`).join('')}
                            </ul>
                            ${isAvailable 
                                ? `<a href="booking.html?kendaraan=${encodeURIComponent(item.nama)}" class="btn-book">Book Sekarang</a>`
                                : `<a href="https://wa.me/6281263860005?text=Halo,%20saya%20mau%20tanya%20ketersediaan%20${encodeURIComponent(item.nama)}" class="btn-book disabled">Hubungi Admin</a>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
            
            // Apply fade animation
            document.querySelectorAll('.fade-in').forEach(el => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('visible');
                    });
                }, { threshold: 0.1 });
                observer.observe(el);
            });
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderKendaraan(btn.dataset.filter);
            });
        });
        
        // Initial render
        document.addEventListener('DOMContentLoaded', () => renderKendaraan());
    </script>
</body>
</html>
